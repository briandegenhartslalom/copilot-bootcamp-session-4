<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slalom Capabilities Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <img src="https://colby-timm.github.io/images/byte-teacher.png" alt="Byte mascot" class="mascot" />
        <div class="header-text">
          <h1>Slalom Capabilities Management</h1>
          <h2>Consulting Expertise Platform</h2>
        </div>
      </div>
    </header>

    <main>
      <section id="capabilities-container">
        <h3>Available Capabilities</h3>

        <div id="search-filter-toolbar">
          <div class="search-row">
            <input
              type="text"
              id="search-input"
              placeholder="Search by name, description, certification, or consultant..."
              aria-label="Search capabilities"
            />
          </div>
          <div class="filter-row">
            <div class="filter-group">
              <label for="filter-practice-area">Practice Area</label>
              <select id="filter-practice-area">
                <option value="">All Areas</option>
                <option value="Technology">Technology</option>
                <option value="Strategy">Strategy</option>
                <option value="Operations">Operations</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="filter-vertical">Industry Vertical</label>
              <select id="filter-vertical">
                <option value="">All Verticals</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Financial Services">Financial Services</option>
                <option value="Retail">Retail</option>
                <option value="Manufacturing">Manufacturing</option>
                <option value="Government">Government</option>
                <option value="Technology">Technology</option>
              </select>
            </div>
            <div class="filter-group">
              <label for="sort-by">Sort By</label>
              <select id="sort-by">
                <option value="name">Name (A–Z)</option>
                <option value="name-desc">Name (Z–A)</option>
                <option value="capacity">Capacity (High–Low)</option>
                <option value="capacity-asc">Capacity (Low–High)</option>
                <option value="consultants">Team Size (Large–Small)</option>
                <option value="practice_area">Practice Area</option>
              </select>
            </div>
            <button id="clear-filters" class="clear-btn">Clear Filters</button>
          </div>
          <div id="results-count" class="results-count"></div>
        </div>

        <div id="capabilities-list">
          <!-- Capabilities will be loaded here -->
          <p>Loading capabilities...</p>
        </div>
      </section>

      <section id="register-container">
        <h3>Register Your Expertise</h3>
        <form id="register-form">
          <div class="form-group">
            <label for="email">Consultant Email:</label>
            <input type="email" id="email" required placeholder="your-email@slalom.com" />
          </div>
          <div class="form-group">
            <label for="capability">Select Capability:</label>
            <select id="capability" required>
              <option value="">-- Select a capability --</option>
              <!-- Capability options will be loaded here -->
            </select>
          </div>
          <button type="submit">Register Expertise</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <img src="https://colby-timm.github.io/images/byte-celebrate.png" alt="Byte celebrating" class="footer-mascot" />
        <p>&copy; 2025 Slalom • Building Better Tomorrow</p>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
